        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        #root{height:100dvh;display:flex;flex-direction:column;background:#fff}
        @media(min-width:900px){body{overflow:hidden}#root{flex-direction:row;background:#F0F2F5;max-width:unset;margin:0;box-shadow:none}}
        .sidebar{display:none}
        @media(min-width:900px){.sidebar{display:flex;flex-direction:column;width:240px;min-width:240px;background:#0F1B2D;height:100dvh;position:relative;z-index:10;flex-shrink:0}.main-content{flex:1;overflow:hidden;display:flex;flex-direction:column;height:100dvh}}

        .nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
        .nav-item.active{background:rgba(249,115,22,.2);color:#FB923C;font-weight:600}
        .desktop-topbar{display:none}
        @media(min-width:900px){.desktop-topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:#fff;border-bottom:1px solid #E8ECF0;flex-shrink:0}.mobile-only{display:none!important}}
        @media(max-width:899px){.desktop-only{display:none!important}}
        .ticket-table{width:100%;border-collapse:collapse;font-size:14px}
        .ticket-table th{text-align:left;padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9BABB8;background:#F8FAFB;border-bottom:1px solid #E8ECF0;white-space:nowrap}
        .ticket-table td{padding:14px 16px;border-bottom:1px solid #F0F2F5;color:#1E2D3D;vertical-align:middle}
        .ticket-table tr:hover td{background:#F7FAFF}
        .ticket-table tr{cursor:pointer;transition:background .1s}
        .stat-card{background:#fff;border-radius:14px;padding:20px 24px;border:1px solid #E8ECF0;display:flex;flex-direction:column;gap:6px}
        .stat-card .stat-value{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;line-height:1;color:#0F1B2D}
        .stat-card .stat-label{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#9BABB8}
        .stat-card .stat-dot{width:8px;height:8px;border-radius:50%;margin-right:6px;display:inline-block}
        .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
        .badge-open{background:#FFF3E0;color:#E65100}
        .badge-progress{background:#E3F2FD;color:#9A3412}
        .badge-pending{background:#F3E5F5;color:#6A1B9A}
        .badge-solved{background:#E8F5E9;color:#2E7D32}
        .device-card{background:#fff;border:1px solid #E8ECF0;border-radius:12px;padding:16px;cursor:pointer;transition:all .15s}
        .device-card:hover{border-color:#F97316;box-shadow:0 2px 12px rgba(249,115,22,.1)}

// ─── APP WRAPPER ──────────────────────────────────────────────────────────────
let showToast=()=>{};

function AppWrapper(){
  const[ready,setReady]=useState(false);
  const[toast,setToast]=useState(null);

  showToast=useCallback((msg,type='success')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  },[]);

  useEffect(()=>{
    Promise.all([import(firebaseAppUrl),import(firebaseAuthUrl)])
      .then(([app,auth])=>{window.firebase={app,auth};setReady(true)});
  },[]);

  if(!ready)return<LoadingScreen message="Iniciando sistema..."/>;
  return(
    <>
      <App/>
      {toast && (
        <div className="fade-in" style={{position:'fixed',bottom:24,right:24,left:isDesktop()? 'auto':24,zIndex:1000,padding:'12px 20px',borderRadius:12,background:'#fff',boxShadow:'0 10px 30px rgba(0,0,0,0.15)',display:'flex',alignItems:'center',gap:10,border:'1px solid #E8ECF0'}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:toast.type==='error'?'#EF4444':(toast.type==='info'?'#3B82F6':'#10B981')}}/>
          <span style={{fontSize:14,fontWeight:600,color:'#0F1B2D'}}>{toast.msg}</span>
        </div>
      )}
    </>
  );
}

function App(){
  const{initializeApp}=window.firebase.app;
  const{getAuth,onAuthStateChanged,signInAnonymously}=window.firebase.auth;
  const app=useMemo(()=>initializeApp(firebaseConfig),[]);
  const auth=useMemo(()=>getAuth(app),[app]);
  const[view,setView]=useState('login');
  const[user,setUser]=useState(null);
  const[glpiSession,setGlpiSession]=useState(null);
  const[isLoading,setIsLoading]=useState(true);
  const[selectedTicketId,setSelectedTicketId]=useState(null);
  const[selectedDevice,setSelectedDevice]=useState(null);

  const navigateToDevice = (device) => {
    setSelectedDevice(device);
    if (!isDesktop()) setView('deviceDetail');
  };

  useEffect(()=>{
    const unsub=onAuthStateChanged(auth,async u=>{if(u)setUser(u);else await signInAnonymously(auth)});
    return unsub;
  },[auth]);

  useEffect(()=>{
    if(!user)return;
    const v=localStorage.getItem('appVersion');
    if(v!==APP_VERSION){localStorage.removeItem('glpiSessionData');localStorage.setItem('appVersion',APP_VERSION)}
    const saved=localStorage.getItem('glpiSessionData');
    if(saved){try{setGlpiSession(JSON.parse(saved));setView('dashboard')}catch{}}
    setIsLoading(false);
  },[user]);

  const handleLogin=sess=>{setGlpiSession(sess);localStorage.setItem('glpiSessionData',JSON.stringify(sess));setView('dashboard')};
  const handleLogout=()=>{setGlpiSession(null);localStorage.removeItem('glpiSessionData');setView('login')};

  if(isLoading)return<LoadingScreen message="Verificando sessão..."/>;
  if(view==='login')return<LoginScreen onLogin={handleLogin}/>;
  if(isDesktop()&&view==='dashboard')return<DesktopApp session={glpiSession} onLogout={handleLogout}/>;
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100dvh',background:'#f8fafc'}}>
      {view==='dashboard'&&<MobileDashboard session={glpiSession} onTicket={id=>{setSelectedTicketId(id);setView('ticketDetail')}} onDevice={navigateToDevice} onLogout={handleLogout}/>}
      {view==='ticketDetail'&&<TicketDetail session={glpiSession} ticketId={selectedTicketId} onBack={()=>setView('dashboard')}/>}
      {view==='deviceDetail'&&<DeviceDetail session={glpiSession} device={selectedDevice} onBack={()=>setView('dashboard')}/>}
    </div>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const[username,setUsername]=useState(localStorage.getItem('glpiUsername')||'');
  const[password,setPassword]=useState('');
  const[showPass,setShowPass]=useState(false);
  const[remember,setRemember]=useState(true);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const[entities,setEntities]=useState([]);
  const[pendingSess,setPendingSess]=useState(null);
  const[selEntity,setSelEntity]=useState(null);
  const glpiUrl='https://suporte.tecnoit.com.br';
  const desk=isDesktop();

  const handleSubmit=async e=>{
    e.preventDefault();setLoading(true);setError('');
    try{
      const res=await fetch(`${PROXY}/initSession`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({glpiUrl,username,password,get_full_session:true})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.message||'Falha na autenticação');
      if(remember)localStorage.setItem('glpiUsername',username);else localStorage.removeItem('glpiUsername');
      let fullSession=data.session?.glpimy_entities?data.session:null;
      if(!fullSession){const sRes=await fetch(`${PROXY}/getFullSession`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({glpiUrl,sessionToken:data.session_token})});if(!sRes.ok)throw new Error('Erro ao carregar perfil');fullSession=(await sRes.json()).session}
      const rawEnt=fullSession.glpimy_entities;const parsed=[];
      if(Array.isArray(rawEnt))rawEnt.forEach(e=>parsed.push({id:e.id,name:e.completename||e.name}));
      else if(typeof rawEnt==='object')Object.values(rawEnt).forEach(e=>{if(typeof e==='object')parsed.push({id:e.id,name:e.completename||e.name})});
      parsed.sort((a,b)=>a.name.localeCompare(b.name));
      // Marcar entidade raiz (sem ">") para usar is_recursive=1
      parsed.forEach(e=>{if(!e.name.includes('>'))e.isRoot=true});
      // Sempre mostra seleção
      setEntities(parsed);
      setPendingSess({sessionToken:data.session_token,fullSessionData:fullSession,glpiUrl});
    }catch(err){setError(err.message)}finally{setLoading(false)}
  };

  const confirmEntity=async()=>{
    if(selEntity===null)return;setLoading(true);
    try{
      const ent=entities.find(e=>e.id===selEntity);
      // Entidade raiz: sessão já tem acesso a tudo, não precisa trocar
      if(ent?.isRoot){pendingSess.fullSessionData.glpiactive_entity=selEntity;onLogin(pendingSess);return;}
      const res=await fetch(`${PROXY}/changeActiveEntity`,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({glpiUrl,sessionToken:pendingSess.sessionToken,entities_id:selEntity})});
      if(!res.ok)throw new Error('Falha ao mudar entidade');
      pendingSess.fullSessionData.glpiactive_entity=selEntity;
      onLogin(pendingSess);
    }catch(e){setError(e.message);setLoading(false)}
  };

  if(entities.length>0)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100dvh',background:desk?'#F0F2F5':'#fff'}}>
      <div style={{background:'#fff',borderRadius:desk?20:0,padding:32,width:desk?420:'100%',boxShadow:desk?'0 20px 60px rgba(15,27,45,.12)':'none'}}>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:700,color:'#0F1B2D',marginBottom:4}}>Selecione o Perfil</div>
        <div style={{fontSize:14,color:'#9BABB8',marginBottom:20}}>Qual entidade deseja acessar?</div>
        <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:300,overflowY:'auto',marginBottom:16}}>
          {entities.map(ent=><button key={ent.id} onClick={()=>setSelEntity(ent.id)} style={{padding:'12px 16px',borderRadius:12,border:`2px solid ${selEntity===ent.id?'#EA580C':'#E8ECF0'}`,background:selEntity===ent.id?'#FFF7ED':'#fff',color:selEntity===ent.id?'#C2410C':'#1E2D3D',fontWeight:600,fontSize:14,cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}><span>{ent.name}</span>{ent.isRoot&&<span style={{fontSize:10,fontWeight:700,background:'#FFF7ED',color:'#EA580C',border:'1px solid #FED7AA',borderRadius:20,padding:'2px 8px',whiteSpace:'nowrap'}}>VER TUDO</span>}</button>)}
        </div>
        {error&&<div style={{padding:'10px 14px',background:'#FEF2F2',borderRadius:10,color:'#DC2626',fontSize:13,marginBottom:12}}>{error}</div>}
        <button onClick={confirmEntity} disabled={loading||selEntity===null} style={{width:'100%',padding:14,borderRadius:12,border:'none',background:'#EA580C',color:'#fff',fontSize:15,fontWeight:700,cursor:loading||selEntity===null?'not-allowed':'pointer',opacity:loading||selEntity===null?.6:1,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          {loading?<Spinner size={20} color="#fff"/>:'ENTRAR'}
        </button>

    </div>
  );

  if(desk)return(

        <img src="assets/logo.png" alt="TecnoIT" style={{height:30,objectFit:'contain',objectPosition:'left',filter:'brightness(0) invert(1)',opacity:.8,position:'relative',zIndex:1}} onError={e=>{e.target.style.display='none'}}/>
        <div style={{position:'relative',zIndex:1}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:7,background:'rgba(234,88,12,.14)',border:'1px solid rgba(251,146,60,.18)',borderRadius:20,padding:'5px 13px',marginBottom:22}}>

          </div>

          <div style={{marginTop:32,display:'flex',flexDirection:'column',gap:11}}>
            {[{icon:'ticket',label:'Chamados em tempo real'},{icon:'box',label:'Inventário de equipamentos'},{icon:'users',label:'Catálogo de usuários'}].map(f=>(

                  <Icon name={f.icon} size={12} color="#FB923C"/>

        <div style={{position:'relative',zIndex:1,fontSize:11,color:'#1E3248'}}>© {new Date().getFullYear()} TecnoIT</div>
      </div>
      {/* Painel direito */}
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',background:'#fff',padding:'40px 60px'}}>
        <div style={{width:'100%',maxWidth:380}}>
          <div style={{marginBottom:34}}>

            <div style={{fontSize:13,color:'#9BABB8'}}>Acesse com suas credenciais de rede</div>
          </div>
          <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:18}}>

              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#8A9AB0',marginBottom:7,letterSpacing:'.07em',textTransform:'uppercase'}}>Usuário</label>

                <div style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><Icon name="user" size={15} color="#C8D4DF"/></div>
                <input type="text" value={username} onChange={e=>setUsername(e.target.value)} autoCapitalize="none" autoComplete="username" required placeholder="usuário de rede"
                  style={{width:'100%',padding:'13px 14px 13px 40px',borderRadius:10,border:'1.5px solid #E8ECF4',fontSize:14,outline:'none',background:'#F9FAFB',color:'#0A1628'}}
                  onFocus={e=>e.target.style.borderColor='#EA580C'} onBlur={e=>e.target.style.borderColor='#E8ECF4'}/>

// ─── DESKTOP TICKETS ──────────────────────────────────────────────────────────
function DesktopTickets({session,onTicket}){
  const{sessionToken,fullSessionData,glpiUrl}=session;
  const userId=fullSessionData?.glpiID?parseInt(fullSessionData.glpiID):0;
  const[tickets,setTickets]=useState([]);
  const[loading,setLoading]=useState(true);
  const[filter,setFilter]=useState('all');
  const[search,setSearch]=useState('');
  const[range,setRange]=useState(100);

  const load=async()=>{
    setLoading(true);
    try{const res=await fetch(`${PROXY}/getTickets`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({glpiUrl,sessionToken,range:`0-${range-1}`})});const data=await res.json();setTickets(data.tickets||[])}
    catch(e){console.error(e)}finally{setLoading(false)}
  };
  useEffect(()=>{load()},[range]);

  const filtered=tickets.filter(t=>{
    const s=t.status;
    const ms=!search||t.name?.toLowerCase().includes(search.toLowerCase())||String(t.id).includes(search);
    if(!ms)return false;
    if(filter==='me')return t.users_id_assign===userId||t.users_id_recipient===userId;
    if(filter==='open')return s===1||s===2||s===3;
    if(filter==='pending')return s===4;
    if(filter==='solved')return s===5||s===6;
    return true;
  });

  const stats=[
    {label:'Total',value:tickets.length,color:'#EA580C',dot:'#EA580C'},
    {label:'Em andamento',value:tickets.filter(t=>t.status===1||t.status===2||t.status===3).length,color:'#E65100',dot:'#F97316'},
    {label:'Pendentes',value:tickets.filter(t=>t.status===4).length,color:'#6A1B9A',dot:'#A855F7'},
    {label:'Finalizados',value:tickets.filter(t=>t.status===5||t.status===6).length,color:'#2E7D32',dot:'#22C55E'},
  ];

  return(
    <>
      <div className="desktop-topbar">
        <div>
          <div style={{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:700,color:'#0F1B2D',letterSpacing:'-0.02em'}}>Chamados</div>
          <div style={{fontSize:13,color:'#9BABB8',marginTop:2}}>{tickets.length} chamados carregados</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{position:'relative'}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar chamado..." style={{padding:'8px 12px 8px 34px',borderRadius:10,border:'1px solid #E8ECF0',fontSize:13,width:240,outline:'none',background:'#F8FAFB',color:'#1E2D3D'}}/>
            <div style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><Icon name="search" size={14} color="#9BABB8"/></div>
          </div>
          <button onClick={load} style={{padding:'8px 14px',borderRadius:10,border:'1px solid #E8ECF0',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontSize:13,color:'#4A6380',fontWeight:500}}>
            <Icon name="refresh" size={14} color="#4A6380"/>Atualizar
          </button>
        </div>
      </div>
      <div style={{flex:1,overflow:'auto',padding:'20px 28px'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
          {stats.map(s=>(
            <div key={s.label} className="stat-card fade-in">
              <div style={{display:'flex',alignItems:'center'}}><span className="stat-dot" style={{background:s.dot}}/><span className="stat-label">{s.label}</span></div>
              <div className="stat-value" style={{color:s.color}}>{s.value}</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:6,marginBottom:16}}>
          {[{id:'all',label:'Todos'},{id:'me',label:'Para mim'},{id:'open',label:'Em andamento'},{id:'pending',label:'Pendentes'},{id:'solved',label:'Finalizados'}].map(f=>(

  const load=async()=>{
    setLoading(true);
    try{const res=await fetch(`${PROXY}/getAssets`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({glpiUrl,sessionToken,itemtype:type,range:'0-200'})});if(res.ok){const data=await res.json();setDevices(Array.isArray(data.assets)?data.assets:[])}else setDevices([])}

  const filteredUsers = responsibleSearch ? USERS.filter(u =>

function AddDeviceModal({session,type,onClose}){
  const{sessionToken,glpiUrl}=session;
  const[form,setForm]=useState({name:'',serial:'',otherserial:'',comment:''});
  const[saving,setSaving]=useState(false);
  const[responsibleSearch,setResponsibleSearch]=useState('');
  const[selectedResponsible,setSelectedResponsible]=useState(null);
  const[termo,setTermo]=useState(null);
  const[isOcrLoading,setIsOcrLoading]=useState(false);
  const[error,setError]=useState('');
  const labels={Computer:'Computador',NetworkEquipment:'Equipamento de Rede',Printer:'Impressora',Peripheral:'Periférico'};
  const fileInputRef = useRef(null);

  const [photo, setPhoto] = useState(null);
  const [photoPreview, setPhotoPreview] = useState(null);

  const handleFileChange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setPhoto(file);
    setPhotoPreview(URL.createObjectURL(file));

    setIsOcrLoading(true);
    setError('');
    try {
      const { data: { text } } = await Tesseract.recognize(file, 'por+eng', {
        logger: m => console.log(m)
      });

      console.log("OCR Result:", text);

      const serialRegex = /(?:S\/N|SERIAL|SERIE|S\/N:|N\/S|SÉRIE)\s*[:=]?\s*([A-Z0-9]{5,})/i;
      const modelRegex = /(?:MODEL|MODELO|MOD:|TYPE|TIPO)\s*[:=]?\s*([A-Z0-9\-\/ ]{3,})/i;

      const serialMatch = text.match(serialRegex);
      const modelMatch = text.match(modelRegex);

      setForm(prev => {
        const next = { ...prev };
        if (serialMatch) next.serial = serialMatch[1].trim();
        if (modelMatch) next.name = modelMatch[1].trim();
        next.comment = (next.comment ? next.comment + '\n' : '') + `[OCR]: ${text.slice(0, 200)}...`;
        return next;
      });

      showToast('OCR finalizado com sucesso!', 'success');
    } catch (err) {
      console.error("OCR Error:", err);
      setError('Falha ao processar imagem (OCR).');
    } finally {
      setIsOcrLoading(false);
    }
  };

  const filteredUsers = useMemo(() => {
    if(!responsibleSearch) return [];
    return USERS.filter(u => u[0].toLowerCase().includes(responsibleSearch.toLowerCase())).slice(0, 5);
  }, [responsibleSearch]);

  const save=async()=>{
    if(!form.name.trim()){setError('Nome é obrigatório');return}
    setSaving(true);setError('');
    try{
      const finalForm = { ...form };
      if (selectedResponsible) {
        finalForm.comment = (finalForm.comment ? finalForm.comment + '\n' : '') + `Responsável: ${selectedResponsible[0]} (${selectedResponsible[1]})`;
      }

      const res=await fetch(`${PROXY}/createAsset`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({glpiUrl,sessionToken,itemtype:type,data:finalForm})});
      const data = await res.json();
      if(res.ok) {
        if (photo) {
           const fd = new FormData();
           fd.append('file', photo);
           fd.append('glpiUrl', glpiUrl);
           fd.append('sessionToken', sessionToken);
           await fetch(`${PROXY}/uploadDocumentAsset/${type}/${data.id}`, { method: 'POST', body: fd });
        }
        if (termo) {
           const fd = new FormData();
           fd.append('file', termo);
           fd.append('glpiUrl', glpiUrl);
           fd.append('sessionToken', sessionToken);
           await fetch(`${PROXY}/uploadDocumentAsset/${type}/${data.id}`, { method: 'POST', body: fd });
        }
        showToast('Dispositivo criado com sucesso!');
        onClose();
      } else {
        setError(data.message||`Erro ${res.status}`);
      }
    }
    catch(e){setError(e.message)}finally{setSaving(false)}
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(15,27,45,.5)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(2px)'}}>
      <div className="fade-in" style={{background:'#fff',borderRadius:16,padding:28,width:480,boxShadow:'0 20px 60px rgba(15,27,45,.2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
          <div>
            <div style={{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:700,color:'#0F1B2D'}}>Novo {labels[type]}</div>
            <div style={{fontSize:13,color:'#9BABB8',marginTop:2}}>Preencha os dados do dispositivo</div>
          </div>
          <div style={{display:'flex', gap: 8}}>
            <button id="btn-ocr" onClick={() => fileInputRef.current?.click()} disabled={isOcrLoading} style={{padding:8,borderRadius:8,border:'1px solid #E8ECF0',background:'#FFF7ED',cursor:'pointer', position:'relative'}} title="Escanear Etiqueta (OCR)">
              {isOcrLoading ? <Spinner size={16}/> : <Icon name="camera" size={16} color="#EA580C"/>}
              <input type="file" ref={fileInputRef} onChange={handleFileChange} accept="image/*" capture="environment" style={{display:'none'}}/>
            </button>
            <button onClick={onClose} style={{padding:8,borderRadius:8,border:'1px solid #E8ECF0',background:'#fff',cursor:'pointer'}}><Icon name="x" size={16} color="#6B7280"/></button>
          </div>
        </div>
        {photoPreview && (
          <div style={{marginBottom:16, position:'relative'}}>
             <img src={photoPreview} style={{width:'100%', height:120, objectFit:'cover', borderRadius:12, border:'1px solid #E8ECF0'}}/>
             <button onClick={()=>{setPhoto(null);setPhotoPreview(null)}} style={{position:'absolute', top:8, right:8, background:'rgba(0,0,0,0.5)', border:'none', borderRadius:'50%', width:24, height:24, color:'#fff', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center'}}><Icon name="x" size={14}/></button>
          </div>
        )}
        {[{k:'name',label:'Nome / Modelo *',ph:'Ex: IdeaPad 3'},{k:'serial',label:'Número de série',ph:'Ex: SN123456'},{k:'otherserial',label:'Nº inventário',ph:'Ex: INV-001'},{k:'comment',label:'Observações',ph:'Informações adicionais'}].map(f=>(
          <div key={f.k} style={{marginBottom:14}}>
            <label style={{display:'block',fontSize:12,fontWeight:600,color:'#4A6380',marginBottom:5}}>{f.label}</label>
            <input value={form[f.k]} onChange={e=>setForm({...form,[f.k]:e.target.value})} placeholder={f.ph}
              style={{width:'100%',padding:'10px 14px',borderRadius:10,border:'1px solid #E8ECF0',fontSize:14,outline:'none',color:'#0F1B2D',background:'#F8FAFB'}}/>
          </div>
        ))}
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:12,fontWeight:600,color:'#4A6380',marginBottom:5}}>Responsável</label>
          <div style={{position:'relative'}}>
            <input value={responsibleSearch} onChange={e=>setResponsibleSearch(e.target.value)} placeholder="Buscar funcionário..."

// ─── TICKET DETAIL ────────────────────────────────────────────────────────────
function TicketDetail({session,ticketId,onBack,desktop}){
  const{sessionToken,glpiUrl}=session;
  const[ticket,setTicket]=useState(null);
  const[loading,setLoading]=useState(true);
  const[responseContent,setResponseContent]=useState('');
  const[evidence,setEvidence]=useState(null);
  const[responseType,setResponseType]=useState('comment');
  const[techData,setTechData]=useState({ponto:'',alcas:'',esticador:'',conector:'',metragemInicial:'',metragemFinal:'',drop:'',extras:''});
  const[isSubmitting,setIsSubmitting]=useState(false);
  const[stockItems,setStockItems]=useState([]);
  const[availableStock,setAvailableStock]=useState([]);
  const[selectedStockId,setSelectedStockId]=useState('');
  const[customItemName,setCustomItemName]=useState('');
  const[stockQty,setStockQty]=useState(1);
  const[isModalOpen,setIsModalOpen]=useState(false);
  const[showHelp,setShowHelp]=useState(false);

  const metragemGasta=useMemo(()=>{
    const clean=v=>String(v).replace(',','.');
    const i=parseFloat(clean(techData.metragemInicial));const f=parseFloat(clean(techData.metragemFinal));
    if(isNaN(i)||isNaN(f))return 0;return Math.abs(f-i).toFixed(2);
  },[techData.metragemInicial,techData.metragemFinal]);

  useEffect(()=>{
    fetch(`${PROXY}/getTicketDetails/${ticketId}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({glpiUrl,sessionToken})})
      .then(r=>r.ok?r.json():null).then(d=>{if(d)setTicket(d)}).finally(()=>setLoading(false));
    fetch(`${PROXY}/getConsumables`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({glpiUrl,sessionToken})})
      .then(r=>r.ok?r.json():[]).then(d=>{if(Array.isArray(d))setAvailableStock(d)}).catch(()=>{});
  },[ticketId]);

  const handleAddStock=()=>{
    if(!selectedStockId||stockQty<=0)return;
    let name='',id=selectedStockId;
    if(selectedStockId==='other'){if(!customItemName.trim())return;name=customItemName;id='custom-'+Date.now()}
    else{const item=availableStock.find(s=>String(s.id)===String(selectedStockId));if(!item)return;name=item.name}
    setStockItems(p=>[...p,{id,name,qty:stockQty}]);setSelectedStockId('');setCustomItemName('');setStockQty(1);setIsModalOpen(false);
  };

  const handleSubmit=async()=>{
    if(!responseContent){showToast('Digite a descrição.', 'error');return}
    const isSolving=responseType==='solution';
    if(isSolving){
      for(const k of['ponto','drop','alcas','esticador','conector','metragemInicial','metragemFinal']){if(techData[k]===''){showToast(`Campo obrigatório: ${k}`, 'error');return}}
      if(!evidence){showToast('Evidência obrigatória.', 'error');return}
    }
    setIsSubmitting(true);
    try{
      let finalContent='';
      if(isSolving)finalContent=`<div style="border:1px solid #ddd;padding:10px;border-radius:8px;background:#f9f9f9;margin-bottom:15px"><h3 style="margin-top:0">📋 Dados Técnicos</h3><table style="width:100%;border-collapse:collapse;font-size:13px"><tr><td style="padding:4px;font-weight:bold">Ponto:</td><td>${techData.ponto}</td></tr><tr><td style="padding:4px;font-weight:bold">Drop:</td><td>${techData.drop}</td></tr><tr><td style="padding:4px;font-weight:bold">Alças:</td><td>${techData.alcas}</td></tr><tr><td style="padding:4px;font-weight:bold">Esticador:</td><td>${techData.esticador}</td></tr><tr><td style="padding:4px;font-weight:bold">Conector:</td><td>${techData.conector}</td></tr><tr><td style="padding:4px;font-weight:bold">Metr. Inicial:</td><td>${techData.metragemInicial}m</td></tr><tr><td style="padding:4px;font-weight:bold">Metr. Final:</td><td>${techData.metragemFinal}m</td></tr><tr style="background:#eef"><td style="padding:4px;font-weight:bold">Gasto:</td><td><b>${metragemGasta}m</b></td></tr>${techData.extras?`<tr><td style="padding:4px;font-weight:bold">Extras:</td><td>${techData.extras}</td></tr>`:''}</table></div><div><strong>Ação Realizada:</strong><br/>${responseContent.replace(/\n/g,'<br>')}</div>`;
      else finalContent=responseContent.replace(/\n/g,'<br>');
      if(evidence){const fd=new FormData();fd.append('file',evidence);fd.append('glpiUrl',glpiUrl);fd.append('sessionToken',sessionToken);const r=await fetch(`${PROXY}/uploadDocument/${ticketId}`,{method:'POST',body:fd});if(r.ok)finalContent+=`<br><i>[Evidência: ${evidence.name}]</i>`;else throw new Error('Falha ao enviar evidência.')}
      const res=await fetch(`${PROXY}/respondTicket`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({glpiUrl,sessionToken,ticketId,content:finalContent,status:isSolving?5:2,stockItems,entities_id:ticket?.entities_id})});
      const data=await res.json();if(!res.ok)throw new Error(data.message||'Erro ao responder');
      showToast(isSolving?'Chamado solucionado!':'Resposta enviada!', 'success');onBack();
    }catch(e){showToast('Erro: '+e.message, 'error')}finally{setIsSubmitting(false)}
  };

  if(loading)return<LoadingScreen message="Carregando chamado..."/>;
  if(!ticket)return<div style={{padding:24,textAlign:'center'}}><button onClick={onBack} style={{background:'none',border:'none',color:'#EA580C',cursor:'pointer',fontSize:14,fontWeight:600}}>← Voltar</button><p style={{color:'#9BABB8',marginTop:16}}>Erro ao carregar.</p></div>;

  const st=statusInfo(ticket.status);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'#F8FAFB'}}>
      <div style={{background:'#fff',padding:'14px 20px',borderBottom:'1px solid #E8ECF0',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',padding:4,display:'flex'}}><Icon name="back" size={20} color="#6B7280"/></button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:16,color:'#0F1B2D',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>Chamado #{ticket.id}</div>
          <div style={{fontSize:12,color:'#9BABB8',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ticket.name}</div>
        </div>
        <span className={`badge ${st.cls}`}>{st.label}</span>
        <button onClick={()=>setShowHelp(true)} style={{width:32,height:32,borderRadius:'50%',background:'#FFF7ED',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:'#EA580C',fontSize:14}}>?</button>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:desktop?'20px 28px':16,display:'flex',flexDirection:'column',gap:14}}>
        <div style={{background:'#fff',borderRadius:14,padding:16,border:'1px solid #E8ECF0'}}>
          <div style={{fontSize:12,color:'#9BABB8',marginBottom:8}}>{ticket.date}</div>
          <div style={{fontSize:14,color:'#4A6380',lineHeight:1.6}} dangerouslySetInnerHTML={{__html:ticket.content}}/>
        </div>

        <div style={{display:'flex',background:'#E8ECF0',borderRadius:12,padding:4,gap:4}}>
          {[{id:'comment',label:'Comentário'},{id:'solution',label:'✅ Solucionar'}].map(opt=>(
            <button key={opt.id} onClick={()=>setResponseType(opt.id)} style={{flex:1,padding:'8px',borderRadius:9,border:'none',cursor:'pointer',fontSize:13,fontWeight:700,transition:'all .15s',background:responseType===opt.id?'#fff':'transparent',color:responseType===opt.id?(opt.id==='solution'?'#15803D':'#0F1B2D'):'#9BABB8',boxShadow:responseType===opt.id?'0 1px 4px rgba(0,0,0,.1)':'none'}}>
              {opt.label}
            </button>
          ))}
        </div>

        {responseType==='solution'&&(
          <div style={{background:'#fff',borderRadius:14,padding:16,border:'1px solid #E8ECF0'}}>
            <div style={{fontWeight:700,color:'#0F1B2D',fontSize:14,marginBottom:12}}>Dados Técnicos <span style={{color:'#DC2626'}}>* Obrigatórios</span></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              {[{k:'ponto',label:'Ponto *',ph:'Nome/ID'},{k:'drop',label:'Drop *',ph:'Tipo/Metros'}].map(f=>(
                <div key={f.k}><div style={{fontSize:11,fontWeight:600,color:'#4A6380',marginBottom:4}}>{f.label}</div><input value={techData[f.k]} onChange={e=>setTechData({...techData,[f.k]:e.target.value})} placeholder={f.ph} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid #E8ECF0',fontSize:14,outline:'none',background:'#F8FAFB'}}/></div>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
              {[{k:'alcas',label:'Alças *'},{k:'esticador',label:'Esticador *'},{k:'conector',label:'Conector *'}].map(f=>(
                <div key={f.k}><div style={{fontSize:11,fontWeight:600,color:'#4A6380',marginBottom:4}}>{f.label}</div><input type="number" min="0" value={techData[f.k]} onChange={e=>setTechData({...techData,[f.k]:e.target.value})} placeholder="0" style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid #E8ECF0',fontSize:14,outline:'none',background:'#F8FAFB'}}/></div>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              {[{k:'metragemInicial',label:'Metr. Inicial *'},{k:'metragemFinal',label:'Metr. Final *'}].map(f=>(
                <div key={f.k}><div style={{fontSize:11,fontWeight:600,color:'#4A6380',marginBottom:4}}>{f.label}</div><input type="number" min="0" value={techData[f.k]} onChange={e=>setTechData({...techData,[f.k]:e.target.value})} placeholder="Metros" style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid #E8ECF0',fontSize:14,outline:'none',background:'#F8FAFB'}}/></div>
              ))}
            </div>
            <div style={{padding:'8px 12px',background:'#FFF7ED',borderRadius:8,textAlign:'center',fontSize:13,fontWeight:700,color:'#C2410C',marginBottom:10}}>Gasto: {metragemGasta}m</div>
            <div><div style={{fontSize:11,fontWeight:600,color:'#4A6380',marginBottom:4}}>Extras</div><input value={techData.extras} onChange={e=>setTechData({...techData,extras:e.target.value})} placeholder="Ex: Fita isolante..." style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid #E8ECF0',fontSize:14,outline:'none',background:'#F8FAFB'}}/></div>
          </div>
        )}

        <div style={{background:'#fff',borderRadius:14,padding:16,border:'1px solid #E8ECF0',display:'flex',flexDirection:'column',gap:12}}>
          <div style={{fontWeight:700,color:'#0F1B2D',fontSize:14}}>{responseType==='solution'?'Descrição da solução':'Comentário'}</div>
          <textarea value={responseContent} onChange={e=>setResponseContent(e.target.value)} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:'1px solid #E8ECF0',fontSize:14,minHeight:100,outline:'none',resize:'vertical',background:'#F8FAFB'}} placeholder={responseType==='solution'?'Descreva o que foi feito...':'Escreva sua mensagem...'}/>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:responseType==='solution'&&!evidence?'#DC2626':'#4A6380',marginBottom:6}}>{responseType==='solution'?'Evidência *':'Evidência (opcional)'}</div>
            <input type="file" onChange={e=>setEvidence(e.target.files[0])} style={{display:'block',width:'100%',fontSize:13,color:'#6B7280'}}/>
          </div>
        </div>

        <div style={{background:'#fff',borderRadius:14,padding:16,border:'1px solid #E8ECF0'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontWeight:700,color:'#0F1B2D',fontSize:14}}>Insumos</div>
            <button onClick={()=>setIsModalOpen(true)} style={{padding:'5px 12px',borderRadius:8,background:'#FFF7ED',border:'none',color:'#EA580C',fontSize:12,fontWeight:700,cursor:'pointer'}}>+ Adicionar</button>
          </div>
          {stockItems.length===0?<div style={{fontSize:13,color:'#9BABB8'}}>Nenhum insumo selecionado.</div>:stockItems.map((item,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',background:'#F8FAFB',borderRadius:8,marginBottom:6,fontSize:13}}>
              <span>{item.qty}x {item.name}</span>
              <button onClick={()=>setStockItems(p=>p.filter((_,idx)=>idx!==i))} style={{background:'none',border:'none',cursor:'pointer',color:'#DC2626',fontWeight:700}}>✕</button>
            </div>
          ))}
        </div>
      </div>

      <div style={{background:'#fff',padding:'14px 20px',borderTop:'1px solid #E8ECF0',flexShrink:0}}>
        <button onClick={handleSubmit} disabled={isSubmitting} style={{width:'100%',padding:14,borderRadius:12,border:'none',cursor:isSubmitting?'wait':'pointer',fontSize:15,fontWeight:700,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:responseType==='solution'?'linear-gradient(135deg,#15803D,#16A34A)':'linear-gradient(135deg,#1E3A5F,#EA580C)'}}>
          {isSubmitting?<><Spinner size={18} color="#fff"/>Enviando...</>:(responseType==='solution'?'FINALIZAR CHAMADO':'ENVIAR RESPOSTA')}
        </button>
      </div>

      {showHelp&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'#fff',borderRadius:20,padding:24,width:'100%',maxWidth:400}}>
            <div style={{fontWeight:700,fontSize:18,color:'#0F1B2D',marginBottom:16}}>Como responder?</div>
            <div style={{background:'#F8FAFB',borderRadius:12,padding:14,marginBottom:12}}><div style={{fontWeight:700,marginBottom:4}}>📝 Comentário</div><div style={{fontSize:13,color:'#6B7280'}}>O chamado não será encerrado.</div></div>
            <div style={{background:'#F0FDF4',borderRadius:12,padding:14,marginBottom:20}}><div style={{fontWeight:700,color:'#15803D',marginBottom:4}}>✅ Solucionar</div><div style={{fontSize:13,color:'#4B5563'}}>Preencha todos os dados técnicos e anexe a evidência. Use "0" se necessário.</div></div>
            <button onClick={()=>setShowHelp(false)} style={{width:'100%',padding:12,borderRadius:12,border:'none',background:'#EA580C',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:14}}>Entendi</button>
          </div>
        </div>
      )}

      {isModalOpen&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'#fff',borderRadius:20,padding:24,width:'100%',maxWidth:380,display:'flex',flexDirection:'column',gap:12}}>
            <div style={{fontWeight:700,fontSize:16,color:'#0F1B2D'}}>Adicionar Insumo</div>
            <select value={selectedStockId} onChange={e=>setSelectedStockId(e.target.value)} style={{padding:'10px 12px',borderRadius:10,border:'1px solid #E8ECF0',fontSize:14,outline:'none'}}>
              <option value="">Selecione...</option>
              {availableStock.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              <option value="other">Outro...</option>
            </select>
            {selectedStockId==='other'&&<input value={customItemName} onChange={e=>setCustomItemName(e.target.value)} placeholder="Nome do item" style={{padding:'10px 12px',borderRadius:10,border:'1px solid #E8ECF0',fontSize:14,outline:'none'}}/>}
            <input type="number" min="1" value={stockQty} onChange={e=>setStockQty(e.target.value)} style={{padding:'10px 12px',borderRadius:10,border:'1px solid #E8ECF0',fontSize:14,outline:'none'}}/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setIsModalOpen(false)} style={{flex:1,padding:10,borderRadius:10,border:'1px solid #E8ECF0',background:'#fff',cursor:'pointer',fontSize:14,fontWeight:600,color:'#6B7280'}}>Cancelar</button>
              <button onClick={handleAddStock} style={{flex:2,padding:10,borderRadius:10,border:'none',background:'#EA580C',color:'#fff',cursor:'pointer',fontSize:14,fontWeight:600}}>Salvar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppWrapper/>);
</script>
</body>
</html>
