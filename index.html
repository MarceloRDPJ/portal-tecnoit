        // ─── ADD ASSET VIEW ───────────────────────────────────────────────
        function AddAssetView({ session, activeType, apiCall, onBack, onSaved, showToast }) {
            const { glpiUrl, sessionToken } = session;
            const [step, setStep]           = useState('form'); // form | camera | ocr-review
            const [saving, setSaving]       = useState(false);
            const [ocrLoading, setOcrLoading] = useState(false);
            const [ocrResult, setOcrResult] = useState(null);
            const fileRef                   = useRef(null);
            const [users, setUsers]         = useState([]);
            const [userSearch, setUserSearch] = useState('');
            const [showUserList, setShowUserList] = useState(false);
            const [selectedUser, setSelectedUser] = useState(null);

            const [form, setForm] = useState({
                name: '', serial: '', otherserial: '', manufacturer: '',
                model: '', comment: '', states_id: 0, users_id: 0, locations_id: 0
            });

            const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));

            // Load users for autocomplete
            useEffect(() => {
                const loadUsers = async () => {
                    try {
                        const data = await apiCall('getUsers', { search: '' });
                        setUsers(Array.isArray(data) ? data : []);
                    } catch(e) {}
                };
                loadUsers();
            }, [apiCall]);

            const filteredUsers = users.filter(u => {
                if (!userSearch) return true;
                const q = userSearch.toLowerCase();
                return u.display.toLowerCase().includes(q) || u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q);
            }).slice(0, 20);

            // OCR: send image to Claude
            const handleImageCapture = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setOcrLoading(true);
                try {
                    const fd = new FormData();
                    fd.append('image', file);
                    const r = await fetch(`${PROXY}/api/proxy/ocrAsset`, { method: 'POST', body: fd });
                    if (!r.ok) throw new Error('Falha no OCR');
                    const extracted = await r.json();
                    setOcrResult(extracted);
                    // Pre-fill form with OCR data
                    if (extracted.name)         setField('name', extracted.name);
                    if (extracted.serial)       setField('serial', extracted.serial);
                    if (extracted.manufacturer) setField('manufacturer', extracted.manufacturer);
                    if (extracted.model)        setField('model', extracted.model);
                    if (extracted.notes)        setField('comment', extracted.notes);
                    showToast(`Leitura com confiança ${extracted.confidence || '?'} — revise os dados`, 'success');
                } catch(e) {
                    showToast('Não foi possível ler a imagem. Preencha manualmente.', 'error');
                } finally {
                    setOcrLoading(false);
                }
            };

            const handleSave = async () => {
                if (!form.name.trim()) { showToast('Informe o nome do equipamento', 'error'); return; }
                setSaving(true);
                try {
                    const payload = {
                        name: form.name.trim(),
                        serial: form.serial.trim(),
                        otherserial: form.otherserial.trim(),
                        comment: form.comment.trim(),
                    };
                    if (selectedUser) payload.users_id = selectedUser.id;

                    await apiCall('createAsset', { itemtype: activeType.key, data: payload });
                    onSaved();
                } catch(e) {
                    showToast('Erro ao salvar: ' + e.message, 'error');
                } finally { setSaving(false); }
            };

            const c = COLOR_MAP[activeType.color];
            return (
                <div className="flex flex-col h-full bg-slate-50">
                    <header className="bg-white px-4 py-3 shadow-sm flex items-center gap-3 sticky top-0 z-10">
                        <button onClick={onBack} className="p-2 -ml-1 text-slate-600 hover:bg-slate-100 rounded-xl">
                            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
                        </button>
                        <div>
                            <div className="font-bold text-slate-800 text-sm">Novo {activeType.label.slice(0,-1)}</div>
                            <div className="text-[10px] text-slate-500">Será cadastrado direto no GLPI</div>
                        </div>
                    </header>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4">

                        {/* OCR CARD */}
                        <div className={`rounded-2xl border-2 border-dashed p-4 text-center ${ocrLoading ? 'border-orange-300 bg-orange-50' : ocrResult ? 'border-green-300 bg-green-50' : 'border-slate-200 bg-white'}`}>
                            {ocrLoading ? (
                                <div className="flex flex-col items-center gap-2 py-2">
                                    <div className="w-8 h-8 border-3 border-orange-400 border-t-transparent rounded-full animate-spin" style={{borderWidth:'3px'}}></div>
                                    <p className="text-sm font-semibold text-orange-600">IA lendo o equipamento...</p>
                                    <p className="text-xs text-orange-500">Claude está extraindo os dados da foto</p>
                                </div>
                            ) : ocrResult ? (
                                <div>
                                    <p className="text-sm font-bold text-green-700">✓ Dados extraídos pela IA</p>
                                    <p className="text-xs text-green-600 mt-1">Confiança: <strong>{ocrResult.confidence}</strong> — revise abaixo</p>
                                    <button onClick={() => fileRef.current?.click()} className="mt-2 text-xs text-green-600 underline">Nova foto</button>
                                </div>
                            ) : (
                                <div>
                                    <div className="flex items-center justify-center w-12 h-12 bg-orange-100 rounded-full mx-auto mb-3">
                                        <svg className="w-6 h-6 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="3"/></svg>
                                    </div>
                                    <p className="font-bold text-slate-700 text-sm">Fotografar etiqueta</p>
                                    <p className="text-xs text-slate-500 mt-1">A IA vai ler o serial, modelo e MAC automaticamente</p>
                                    <button onClick={() => fileRef.current?.click()}
                                        className="mt-3 bg-orange-500 hover:bg-orange-600 text-white text-xs font-bold px-5 py-2 rounded-xl shadow-md shadow-orange-200 active:scale-95 transition-all">
                                        Tirar foto / Galeria
                                    </button>
                                </div>
                            )}
                            <input ref={fileRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handleImageCapture} />
                        </div>

                        {/* FORM */}
                        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                            <div className={`px-4 py-2.5 ${c.bg} border-b border-slate-100`}>
                                <p className={`text-xs font-bold ${c.text}`}>Dados do equipamento</p>
                            </div>
                            <div className="p-4 space-y-3">
                                <div>
                                    <label className="text-xs font-semibold text-slate-600 block mb-1">Nome / Hostname *</label>
                                    <input value={form.name} onChange={e => setField('name', e.target.value)}
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
                                        placeholder="ex: LAPTOP-MARCELO" />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-xs font-semibold text-slate-600 block mb-1">Nº de Série</label>
                                        <input value={form.serial} onChange={e => setField('serial', e.target.value)}
                                            className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
                                            placeholder="S/N" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-600 block mb-1">Patrimônio</label>
                                        <input value={form.otherserial} onChange={e => setField('otherserial', e.target.value)}
                                            className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
                                            placeholder="Tag / Inv." />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-xs font-semibold text-slate-600 block mb-1">Fabricante</label>
                                        <input value={form.manufacturer} onChange={e => setField('manufacturer', e.target.value)}
                                            className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
                                            placeholder="ex: Lenovo" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-600 block mb-1">Modelo</label>
                                        <input value={form.model} onChange={e => setField('model', e.target.value)}
                                            className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
                                            placeholder="ex: IdeaPad 3" />
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs font-semibold text-slate-600 block mb-1">Observações</label>
                                    <textarea value={form.comment} onChange={e => setField('comment', e.target.value)} rows={2}
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 resize-none"
                                        placeholder="Informações adicionais..." />
                                </div>
                            </div>
                        </div>

                        {/* RESPONSÁVEL */}
                        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                            <div className="px-4 py-2.5 bg-slate-50 border-b border-slate-100">
                                <p className="text-xs font-bold text-slate-600">Responsável (opcional)</p>
                            </div>
                            <div className="p-4">
                                {selectedUser ? (
                                    <div className="flex items-center justify-between bg-green-50 border border-green-200 rounded-xl p-3">
                                        <div>
                                            <p className="text-sm font-bold text-green-800">{selectedUser.display}</p>
                                            <p className="text-xs text-green-600">{selectedUser.email || selectedUser.name}</p>
                                        </div>
                                        <button onClick={() => { setSelectedUser(null); setUserSearch(''); setField('users_id', 0); }}
                                            className="text-green-500 hover:text-red-500 p-1">
                                            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                                        </button>
                                    </div>
                                ) : (
                                    <div className="relative">
                                        <input value={userSearch}
                                            onChange={e => { setUserSearch(e.target.value); setShowUserList(true); }}
                                            onFocus={() => setShowUserList(true)}
                                            className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
                                            placeholder="Buscar colaborador no GLPI..." />
                                        {showUserList && userSearch && filteredUsers.length > 0 && (
                                            <div className="absolute top-full left-0 right-0 bg-white border border-slate-200 rounded-xl shadow-lg mt-1 z-20 max-h-48 overflow-y-auto">
                                                {filteredUsers.map(u => (
                                                    <button key={u.id} onClick={() => { setSelectedUser(u); setField('users_id', u.id); setUserSearch(''); setShowUserList(false); }}
                                                        className="w-full text-left px-4 py-3 hover:bg-orange-50 border-b border-slate-50 last:border-0">
                                                        <p className="text-sm font-semibold text-slate-800">{u.display}</p>
                                                        <p className="text-xs text-slate-500">{u.email || u.name}</p>
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* SAVE BTN */}
                        <button onClick={handleSave} disabled={saving || !form.name.trim()}
                            className="w-full bg-orange-500 hover:bg-orange-600 disabled:opacity-50 text-white font-bold py-4 rounded-2xl shadow-lg shadow-orange-200 active:scale-98 transition-all flex items-center justify-center gap-2 text-base">
                            {saving ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                    : <><svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg> Salvar no GLPI</>}
                        </button>
                    </div>
                </div>
            );

        // ─── ASSET DETAIL VIEW ────────────────────────────────────────────
        function AssetDetailView({ session, asset, activeType, apiCall, onBack, onSaved, showToast }) {
            const [detail, setDetail]   = useState(null);
            const [loading, setLoading] = useState(true);
            const [users, setUsers]     = useState([]);
            const [userSearch, setUserSearch] = useState('');
            const [showUserList, setShowUserList] = useState(false);
            const [selectedUser, setSelectedUser] = useState(null);
            const [saving, setSaving]   = useState(false);
            const [editName, setEditName] = useState(asset.name || '');
            const [editSerial, setEditSerial] = useState(asset.serial || '');
            const [editComment, setEditComment] = useState(asset.comment || '');

            useEffect(() => {
                const load = async () => {
                    try {
                        const d = await apiCall('getAssetDetail', { itemtype: activeType.key, id: asset.id });
                        setDetail(d);
                        setEditName(d.name || '');
                        setEditSerial(d.serial || '');
                        setEditComment(d.comment || '');
                    } catch(e) {}
                    finally { setLoading(false); }
                };
                load();
                // Load users
                apiCall('getUsers', { search: '' }).then(d => setUsers(Array.isArray(d) ? d : [])).catch(() => {});
            }, [apiCall, activeType, asset.id]);

            const filteredUsers = users.filter(u => {
                if (!userSearch) return true;
                const q = userSearch.toLowerCase();
                return u.display.toLowerCase().includes(q) || u.name.toLowerCase().includes(q);
            }).slice(0, 20);

            const handleSave = async () => {
                setSaving(true);
                try {
                    const data = { name: editName, serial: editSerial, comment: editComment };
                    if (selectedUser) data.users_id = selectedUser.id;
                    await apiCall('updateAsset', { itemtype: activeType.key, id: asset.id, data });
                    onSaved();
                    onBack();
                } catch(e) { showToast('Erro: ' + e.message, 'error'); }
                finally { setSaving(false); }
            };

            const c = COLOR_MAP[activeType.color];
            const d = detail || asset;

            const InfoRow = ({ label, value }) => value ? (
                <div className="flex items-start justify-between py-2.5 border-b border-slate-50 last:border-0">
                    <span className="text-xs text-slate-500 font-medium w-28 flex-shrink-0">{label}</span>
                    <span className="text-xs font-semibold text-slate-800 text-right flex-1 break-all">{value}</span>
                </div>
            ) : null;

            return (
                <div className="flex flex-col h-full bg-slate-50">
                    <header className="bg-white px-4 py-3 shadow-sm flex items-center gap-3 sticky top-0 z-10">
                        <button onClick={onBack} className="p-2 -ml-1 text-slate-600 hover:bg-slate-100 rounded-xl">
                            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
                        </button>
                        <div className={`w-9 h-9 rounded-xl flex items-center justify-center ${c.bg} flex-shrink-0`}>
                            <span style={{fontSize:'18px'}}>{activeType.icon}</span>
                        </div>
                        <div className="flex-1 min-w-0">
                            <div className="font-bold text-slate-800 text-sm truncate">{d.name || '(sem nome)'}</div>
                            <div className="text-[10px] text-slate-500">#{asset.id} · {activeType.label.slice(0,-1)}</div>
                        </div>
                    </header>

                    {loading ? (
                        <div className="flex-1 flex items-center justify-center">
                            <div className="w-8 h-8 border-3 border-orange-400 border-t-transparent rounded-full animate-spin" style={{borderWidth:'3px'}}></div>
                        </div>
                    ) : (
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {/* Info Card */}
                            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                                <div className={`px-4 py-2.5 ${c.bg} border-b border-slate-100`}>
                                    <p className={`text-xs font-bold ${c.text}`}>Informações do GLPI</p>
                                </div>
                                <div className="px-4">
                                    <InfoRow label="Fabricante"  value={d.manufacturers_id || d.manufacturer} />
                                    <InfoRow label="Modelo"      value={d.computermodels_id || d.phonemodels_id || d.monitormodels_id || d.model} />
                                    <InfoRow label="Nº de Série" value={d.serial} />
                                    <InfoRow label="Patrimônio"  value={d.otherserial} />
                                    <InfoRow label="Estado"      value={typeof d.states_id === 'string' ? d.states_id : null} />
                                    <InfoRow label="Localização" value={typeof d.locations_id === 'string' ? d.locations_id : null} />
                                    <InfoRow label="Observações" value={d.comment} />
                                    <InfoRow label="Atualizado"  value={d.date_mod ? new Date(d.date_mod).toLocaleDateString('pt-BR') : null} />
                                </div>
                            </div>

                            {/* Edit Card */}
                            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                                <div className="px-4 py-2.5 bg-slate-50 border-b border-slate-100">
                                    <p className="text-xs font-bold text-slate-600">Editar / Atualizar</p>
                                </div>
                                <div className="p-4 space-y-3">
                                    <div>
                                        <label className="text-xs font-semibold text-slate-600 block mb-1">Nome</label>
                                        <input value={editName} onChange={e => setEditName(e.target.value)}
                                            className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-600 block mb-1">Nº de Série</label>
                                        <input value={editSerial} onChange={e => setEditSerial(e.target.value)}
                                            className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-600 block mb-1">Observações</label>
                                        <textarea value={editComment} onChange={e => setEditComment(e.target.value)} rows={2}
                                            className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 resize-none" />
                                    </div>

                                    {/* Link user */}
                                    <div>
                                        <label className="text-xs font-semibold text-slate-600 block mb-1">Vincular responsável</label>
                                        {selectedUser ? (
                                            <div className="flex items-center justify-between bg-green-50 border border-green-200 rounded-xl p-3">
                                                <div>
                                                    <p className="text-sm font-bold text-green-800">{selectedUser.display}</p>
                                                    <p className="text-xs text-green-600">{selectedUser.email || selectedUser.name}</p>
                                                </div>
                                                <button onClick={() => setSelectedUser(null)} className="text-green-500 hover:text-red-500 p-1">
                                                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="relative">
                                                <input value={userSearch}
                                                    onChange={e => { setUserSearch(e.target.value); setShowUserList(true); }}
                                                    onFocus={() => setShowUserList(true)}
                                                    className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
                                                    placeholder="Buscar colaborador..." />
                                                {showUserList && userSearch && filteredUsers.length > 0 && (
                                                    <div className="absolute top-full left-0 right-0 bg-white border border-slate-200 rounded-xl shadow-lg mt-1 z-20 max-h-40 overflow-y-auto">
                                                        {filteredUsers.map(u => (
                                                            <button key={u.id} onClick={() => { setSelectedUser(u); setUserSearch(''); setShowUserList(false); }}
                                                                className="w-full text-left px-4 py-3 hover:bg-orange-50 border-b border-slate-50 last:border-0">
                                                                <p className="text-sm font-semibold text-slate-800">{u.display}</p>
                                                                <p className="text-xs text-slate-500">{u.email || u.name}</p>
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    <button onClick={handleSave} disabled={saving}
                                        className="w-full bg-orange-500 hover:bg-orange-600 disabled:opacity-50 text-white font-bold py-3.5 rounded-2xl shadow-md shadow-orange-200 active:scale-98 transition-all flex items-center justify-center gap-2">
                                        {saving ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                                 : <><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg> Salvar alterações no GLPI</>}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppWrapper />);
    </script>
</body>
</html>
